<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF 预览</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: #525252;
            overflow: hidden;
        }

        .toolbar {
            background: #323639;
            padding: 10px 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 1px solid #1a1a1a;
        }

        .toolbar button {
            background: #4a4a4a;
            border: 1px solid #5a5a5a;
            color: #fff;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }

        .toolbar button:hover {
            background: #5a5a5a;
        }

        .toolbar button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .page-info {
            color: #fff;
            font-size: 14px;
        }

        .zoom-controls {
            display: flex;
            gap: 5px;
        }

        #canvas-container {
            background: #525252;
            overflow: auto;
            height: calc(100vh - 50px);
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        #pdf-render {
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-size: 18px;
        }

        .error {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ff6b6b;
            font-size: 16px;
            text-align: center;
            max-width: 400px;
        }
    </style>
</head>
<body>
    <div class="toolbar">
        <button id="prev-page" title="上一页">◀ 上一页</button>
        <button id="next-page" title="下一页">下一页 ▶</button>
        <span class="page-info">
            <span id="page-num">0</span> / <span id="page-count">0</span>
        </span>
        <div class="zoom-controls">
            <button id="zoom-out" title="缩小">➖</button>
            <button id="zoom-in" title="放大">➕</button>
        </div>
        <button id="download" title="下载">📥 下载</button>
    </div>

    <div id="canvas-container">
        <canvas id="pdf-render"></canvas>
    </div>

    <div id="loading" class="loading">正在加载 PDF...</div>
    <div id="error" class="error" style="display: none;"></div>

    <!-- 使用本地 PDF.js -->
    <script src="{{ url_for('static', filename='pdfjs/pdf.min.js') }}"></script>
    <script>
        // 从模板获取 PDF URL（Flask 渲染时传入，已自动解码）
        const pdfUrl = {{ pdf_url | tojson | safe }};

        let pdfDoc = null;
        let pageNum = 1;
        let pageRendering = false;
        let pageNumPending = null;
        let scale = 1.5;
        let canvas = document.getElementById('pdf-render');
        let ctx = canvas.getContext('2d');

        // DOM 元素
        const prevButton = document.getElementById('prev-page');
        const nextButton = document.getElementById('next-page');
        const zoomInButton = document.getElementById('zoom-in');
        const zoomOutButton = document.getElementById('zoom-out');
        const downloadButton = document.getElementById('download');
        const pageNumSpan = document.getElementById('page-num');
        const pageCountSpan = document.getElementById('page-count');
        const loadingDiv = document.getElementById('loading');
        const errorDiv = document.getElementById('error');

        // 渲染页面
        function renderPage(num) {
            pageRendering = true;

            // 获取页面
            pdfDoc.getPage(num).then(function(page) {
                const viewport = page.getViewport({scale: scale});
                canvas.height = viewport.height;
                canvas.width = viewport.width;

                // 渲染上下文
                const renderContext = {
                    canvasContext: ctx,
                    viewport: viewport
                };

                const renderTask = page.render(renderContext);

                // 等待渲染完成
                renderTask.promise.then(function() {
                    pageRendering = false;
                    pageNumSpan.textContent = num;
                    loadingDiv.style.display = 'none';

                    if (pageNumPending !== null) {
                        renderPage(pageNumPending);
                        pageNumPending = null;
                    }
                });
            }).catch(function(error) {
                pageRendering = false;
                showError('渲染页面失败: ' + error.message);
            });
        }

        // 队列渲染
        function queueRenderPage(num) {
            if (pageRendering) {
                pageNumPending = num;
            } else {
                renderPage(num);
            }
        }

        // 上一页
        function onPrevPage() {
            if (pageNum <= 1) return;
            pageNum--;
            queueRenderPage(pageNum);
        }

        // 下一页
        function onNextPage() {
            if (pageNum >= pdfDoc.numPages) return;
            pageNum++;
            queueRenderPage(pageNum);
        }

        // 放大
        function onZoomIn() {
            scale += 0.25;
            queueRenderPage(pageNum);
        }

        // 缩小
        function onZoomOut() {
            if (scale <= 0.5) return;
            scale -= 0.25;
            queueRenderPage(pageNum);
        }

        // 下载
        function onDownload() {
            const link = document.createElement('a');
            link.href = pdfUrl;
            link.download = pdfUrl.split('/').pop() || 'document.pdf';
            link.click();
        }

        // 显示错误
        function showError(message) {
            loadingDiv.style.display = 'none';
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
        }

        // 加载 PDF
        function loadPDF(url) {
            loadingDiv.style.display = 'block';
            errorDiv.style.display = 'none';

            console.log('=== 开始加载 PDF ===');
            console.log('原始 URL:', url);

            // 添加时间戳避免缓存
            const urlWithTimestamp = url + (url.includes('?') ? '&' : '?') + 't=' + Date.now();
            console.log('最终 URL（含时间戳）:', urlWithTimestamp);

            // 检查 PDF.js 是否已加载
            if (typeof pdfjsLib === 'undefined') {
                showError('PDF.js 库未加载');
                console.error('pdfjsLib 未定义');
                return;
            }

            console.log('PDF.js 版本:', pdfjsLib.version);

            // 使用配置对象加载 PDF（主线程模式）
            const loadingTask = pdfjsLib.getDocument({
                url: urlWithTimestamp,
                useWorkerFetch: false,
                useSystemFonts: true,
                useRangeRequests: false,
                disableAutoFetch: true,
                disableStream: true
            });

            // 监听加载进度
            loadingTask.onProgress = function(progress) {
                if (progress.total > 0) {
                    const percent = Math.round((progress.loaded / progress.total) * 100);
                    console.log(`PDF 加载进度: ${progress.loaded}/${progress.total} (${percent}%)`);
                } else {
                    console.log('PDF 加载中:', progress.loaded, '字节');
                }
            };

            loadingTask.promise.then(function(pdfDoc_) {
                console.log('✓ PDF 加载成功，页数:', pdfDoc_.numPages);
                pdfDoc = pdfDoc_;
                pageCountSpan.textContent = pdfDoc.numPages;
                pageNum = 1;
                renderPage(pageNum);
            }).catch(function(error) {
                console.error('✗ PDF 加载失败');
                console.error('错误对象:', error);
                console.error('错误消息:', error.message);
                console.error('错误堆栈:', error.stack);

                // 显示详细错误信息
                let errorMsg = '加载 PDF 失败';
                if (error.message) {
                    errorMsg += ': ' + error.message;
                }
                if (error.name) {
                    errorMsg += ' (' + error.name + ')';
                }
                showError(errorMsg);
            });
        }

        // 事件监听
        prevButton.addEventListener('click', onPrevPage);
        nextButton.addEventListener('click', onNextPage);
        zoomInButton.addEventListener('click', onZoomIn);
        zoomOutButton.addEventListener('click', onZoomOut);
        downloadButton.addEventListener('click', onDownload);

        // 键盘快捷键
        document.addEventListener('keydown', function(e) {
            if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                onPrevPage();
            } else if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                onNextPage();
            } else if (e.key === '+' || e.key === '=') {
                onZoomIn();
            } else if (e.key === '-') {
                onZoomOut();
            }
        });

        // 更新按钮状态
        function updateButtonStates() {
            prevButton.disabled = pageNum <= 1;
            nextButton.disabled = !pdfDoc || pageNum >= pdfDoc.numPages;
        }

        // 监听页面渲染完成
        const originalRenderPage = renderPage;
        renderPage = function(num) {
            originalRenderPage(num);
            setTimeout(updateButtonStates, 100);
        };

        // 检查 URL 参数
        if (pdfUrl) {
            console.log('PDF URL from template:', pdfUrl);
            // Flask 已经自动解码了 URL，不需要再次解码
            loadPDF(pdfUrl);
        } else {
            showError('未提供 PDF URL');
        }
    </script>
</body>
</html>
